version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${PORT:-4000}
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - DATABASE_URL=postgresql://cleorf:${DB_PASSWORD:-devpass}@postgres:5432/cleorf
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL_ID=${AI_MODEL_ID:-gpt-4o-mini}
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["npx", "tsx", "src/worker.ts"]
    environment:
      - DATABASE_URL=postgresql://cleorf:${DB_PASSWORD:-devpass}@postgres:5432/cleorf
      - REDIS_URL=redis://redis:6379
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL_ID=${AI_MODEL_ID:-gpt-4o-mini}
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cleorf
      POSTGRES_USER: cleorf
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleorf"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:
